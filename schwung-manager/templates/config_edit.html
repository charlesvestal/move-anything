{{template "base" .}}

{{define "title"}}Edit Configuration - Schwung Manager{{end}}

{{define "content"}}
<div class="page-header">
    <nav aria-label="Breadcrumb" class="breadcrumb">
        <ol>
            <li><a href="/config">Configuration</a></li>
            <li aria-current="page">Edit</li>
        </ol>
    </nav>
    <h1>Edit Configuration</h1>
</div>

<form method="POST" action="/config/save" class="config-form">
    <input type="hidden" name="csrf_token" value="{{$.CSRFToken}}">
    <div class="form-group">
        <label for="config-content">features.json</label>
        <textarea id="config-content" name="content" rows="20" class="config-editor"
                  spellcheck="false" aria-describedby="config-help">{{.Config}}</textarea>
        <p id="config-help" class="form-help">Edit the JSON configuration. Invalid JSON will be rejected.</p>
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save Configuration</button>
        <a href="/config" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{{end}}
